# ── Street View Sampling – Run Configuration ────────────────────────────────
#
# Run with:  python main.py run.yaml
#
# Common optional keys (all have sensible defaults):
#   interval            – metres between midblock sample points (default 15)
#   network_type        – OSM network type (default all_public)
#   edge_index          – 0 = longest street segment (default 0)
#   sample_all          – true to sample every edge (default false)
#   junction_zone_m     – metres from a junction node that are carved out
#                         for a single junction_approach point (default 15)
#   max_snap_distance_m – skip panos farther than this from the request (25)
# ─────────────────────────────────────────────────────────────────────────────

# ── Your job(s) below ──────────────────────────────────────────────────────
mode: polygon
vertices:
  - [40.960517, 29.073858] # Kaplancalı apt.
  - [40.958785, 29.076923] # Psikolog
  - [40.961313, 29.079364] # Akyatırım
  - [40.963044, 29.076467] # Şaşkın tekel

interval: 10
network_type: all_public
sample_all: true
junction_zone_m: 15
max_snap_distance_m: 25
